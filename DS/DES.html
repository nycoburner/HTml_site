<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Cadrastro dos clientes</title>
    <style>
        h1{
            color: rgb(248, 159, 174);
            text-align: center;
            font-family: cursive;
        }
        body{
            background-color: cyan;
        }
    </style>
</head>
<body>
    <header>
    </header>
    <main>
        <h1>Cadrastro dos clientes</h1>
    </main>
        <form>
            <label for="nome"> Nome:</label>
            <input type="text" id="nome" placeholder="Insira o seu nome" required class="Texto_id"> 
            <label for="CPF"> CPF:</label>
            <input type="text" id="CPF" placeholder="999.999.999.99" required class="Texto_id"> 
            <label for="RG"> RG:</label>
            <input type="text" id="RG" required class="Texto_id"> 
            <label for="dataNasci"> Data de nascimento:</label>
            <input type="text" id="dataNasci" placeholder="01/01/01" required class="Texto_id"> 
            <label for="telefone"> Telefone:</label>
            <input type="tel" id="telefone" placeholder="Ex:(99)999-99999" required class="Texto_id"> 
            <label for="email"> E-mail:</label>
            <input type="email" id="email" placeholder="Ex:@gmail.com" required class="Texto_id"> 
            <label for="CEP"> CEP:</label>
            <input type="text" id="CEP" placeholder="XXXXX-XXX" required class="Texto_id"> 
            <label for="rua"> Rua:</label>
            <input type="text" id="rua" required class="Texto_id">
            <label for="bairro"> Bairro:</label>
            <input type="text" id="bairro" required class="Texto_id"> 
            <label for="cidade"> Cidade:</label>
            <input type="text" id="cidade" required class="Texto_id">
            <label for="estado"> Estado:</label>
            <input type="text" id="estado" required class="Texto_id">    

            <input type="submit" value="Enviar Cadrastro"  class="btn_enviar">

        </form>
    <footer>

    </footer>
</body>
</html>
