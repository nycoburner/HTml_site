<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Cadastro</title>
    <style>
        body{
            background-color: rgb(36, 222, 255);
        }
        h1{
            color: rgb(255, 255, 255);
            text-align: center;
            font-family: cursive;
        }
    </style>
    <script>
        function pesquisarCEP(valor) {
    var cep = valor.replace(/\D/g, '');
    var resposta = document.getElementById("resposta");

    resposta.textContent = "";
    document.getElementById("rua").value = "";
    document.getElementById("cidade").value = "";
    document.getElementById("bairro").value = "";
    document.getElementById("estado").value = "";

    if (cep.length === 8) {
        const link = "https://viacep.com.br/ws/" + cep + "/json/?callback=preencherEndereco";
        
        var script = document.createElement("script");
        script.src = link;
        document.body.appendChild(script);
    } else {
        resposta.textContent = "CEP digitado incorretamente";
        document.getElementById("cep").value = "";
    }
}

function preencherEndereco(conteudo) {
    if (!("erro" in conteudo)) {
        document.getElementById("rua").value = conteudo.logradouro;
        document.getElementById("cidade").value = conteudo.localidade;
        document.getElementById("bairro").value = conteudo.bairro;
        document.getElementById("estado").value = conteudo.uf; 
        document.getElementById("resposta").textContent = "CEP não encontrado.";
    }
}
function pegar_dados(){
    const dados = {
        nome:document.getElementById("nome").value,
        cpf:document.getElementById("cpf").value,
        datadenascimento:document.getElementById("datadenascimento").value,
        telefone:document.getElementById("telefone").value,
        cep:document.getElementById("cep").value,
        rua:document.getElementById("rua").value,
        bairro:document.getElementById("bairro").value,
        número:document.getElementById("número").value,
        email:document.getElementById("e-mail").value,
        estado:document.getElementById("estado").value,
        senha:document.getElementById("senha").value,
        cidade:document.getElementById("cidade").value,
    }

return JSON.stringify(dados)

}

async function enviar_cadastro(){
    const dados = pegar_dados()
    try{
        const resposta = await fetch("http://10.216.243.227:3001/clientes",{
            method:"POST",
            headers: {"Content-Type": "application/json"},
            body:dados
        })
        if(!resposta.ok) {alert("Error ao cadastrar")}
        alert("cliente cadastrado com sucesso!")
    } catch (error) {alert("Error em cadastrar!" + error.message)}
}
    </script>
</head>
<body>
    <header>

    </header>
    <main>
        <h1>Cadastro de Clientes</h1>
        <form>
            <label for="nome"> Nome:</label>
            <input type="text" id="nome" placeholder="Insira o seu nome" required class="input_text">

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="444.444.444-44" required class="input_text">

            <label for="datadenascimento">Data de nascimento</label>
            <input type="text" id="datadenascimento" placeholder="22/22/2222" required class="input_text">

            <label for="e-mail">E-mail</label>
            <input type="text" id="e-mail" placeholder="seu e-mail aqui" required class="input_text">

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(99) 9999-9999" required class="input_text">

            <label for="cep">CEP</label>
            <input type="text" id="cep" placeholder="00000-000" onblur="pesquisarCEP(this.value)" required class="input_text">
            <p id="resposta"></p>

            <label for="número">Número</label>
            <input type="text" id="número" placeholder="190, 270, 183" required class="input_text">

            <label for="rua">Rua</label>
            <input type="text" id="rua" placeholder="nome da rua " required class="input_text">

            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" placeholder="Coloque o nome do seu bairro que mora" required class="input_text">

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" placeholder="A cidade onde vocé mora" required class="input_text">

            <label for="estado">Estado</label>
            <input type="text" id="estado" placeholder="O estado onde vocé mora" required class="input_text">

            <label for="senha">Senha</label>
            <input type="text" id="senha" placeholder="Ex:AS3nH@!$2023" required class="input_text">

            
                <!-- CEP, Rua, Número, Bairro, Cidade, Estado(UF), Senha-->

            <input type="button" value="Enviar Cadastro" class="btn_enviar" onclick="enviar_cadastro()">
        </form>
    </main>
    <footer>  

    </footer>
</body>
</html>
